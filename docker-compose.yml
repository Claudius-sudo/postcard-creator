version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postcard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postcard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postcard_password}
      POSTGRES_DB: ${POSTGRES_DB:-postcard_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postcard_user} -d ${POSTGRES_DB:-postcard_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - postcard-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: postcard-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postcard_user:postcard_password@postgres:5432/postcard_db}
      - DEBUG=${DEBUG:-true}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
    ports:
      - "100.76.223.66:8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postcard-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: postcard-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "100.76.223.66:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - postcard-network
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  postcard-network:
    driver: bridge
